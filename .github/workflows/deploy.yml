name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "proxmox-test"
        type: choice
        options:
          - proxmox-test
          - ec2-production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'ec2-production' && 'production' || 'test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Deployment scaffold
        run: node scripts/deploy.mjs "${{ inputs.target }}"
