name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "proxmox-test"
        type: choice
        options:
          - proxmox-test
          - ec2-production

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate Proxmox deployment inputs
        if: ${{ inputs.target == 'proxmox-test' }}
        run: |
          test -f docker-compose.proxmox-test.yml
          test -f Dockerfile
          test -f .env.proxmox-test.example

  deploy-proxmox-test:
    if: ${{ inputs.target == 'proxmox-test' }}
    needs: validate
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Validate Proxmox deployment secrets
        env:
          PROXMOX_HOST: ${{ secrets.PROXMOX_HOST }}
          PROXMOX_USER: ${{ secrets.PROXMOX_USER }}
          PROXMOX_SSH_KEY: ${{ secrets.PROXMOX_SSH_KEY }}
          PROXMOX_APP_DIR: ${{ secrets.PROXMOX_APP_DIR }}
          PROXMOX_TEST_ENV_FILE: ${{ secrets.PROXMOX_TEST_ENV_FILE }}
        run: |
          set -eu

          test -n "$PROXMOX_HOST" || { echo "Missing PROXMOX_HOST secret."; exit 1; }
          test -n "$PROXMOX_USER" || { echo "Missing PROXMOX_USER secret."; exit 1; }
          test -n "$PROXMOX_SSH_KEY" || { echo "Missing PROXMOX_SSH_KEY secret."; exit 1; }
          test -n "$PROXMOX_APP_DIR" || { echo "Missing PROXMOX_APP_DIR secret."; exit 1; }
          test -n "$PROXMOX_TEST_ENV_FILE" || { echo "Missing PROXMOX_TEST_ENV_FILE secret."; exit 1; }

      - name: Deploy to Proxmox test host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROXMOX_HOST }}
          username: ${{ secrets.PROXMOX_USER }}
          key: ${{ secrets.PROXMOX_SSH_KEY }}
          port: ${{ secrets.PROXMOX_PORT || '22' }}
          script_stop: true
          script: |
            set -eu

            APP_DIR="${{ secrets.PROXMOX_APP_DIR }}"
            BRANCH="${{ github.ref_name }}"

            if [ -z "$APP_DIR" ]; then
              echo "Missing PROXMOX_APP_DIR secret."
              exit 1
            fi

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              echo "Expected an existing git checkout at $APP_DIR."
              exit 1
            fi

            command -v git >/dev/null 2>&1 || { echo "git is required on the host."; exit 1; }
            command -v docker >/dev/null 2>&1 || { echo "docker is required on the host."; exit 1; }

            git fetch --all --prune
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            cat > .env.proxmox-test <<'EOF'
            ${{ secrets.PROXMOX_TEST_ENV_FILE }}
            EOF

            if [ ! -s .env.proxmox-test ]; then
              echo ".env.proxmox-test was not written."
              exit 1
            fi

            mkdir -p proxmox-data

            docker compose -f docker-compose.proxmox-test.yml up -d --build
            docker compose -f docker-compose.proxmox-test.yml ps

            curl --fail --silent --show-error http://127.0.0.1:3000/api/health
            curl --fail --silent --show-error http://127.0.0.1:3000/api/system/status

  deploy-ec2-production:
    if: ${{ inputs.target == 'ec2-production' }}
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Production deployment not yet wired
        run: |
          echo "The ec2-production deployment path is not implemented yet."
          echo "Use the proxmox-test target for the active deployment workflow."
          exit 1
