name: Feature request
description: Propose a new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem }
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes: { label: Proposed solution }
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes: { label: Alternatives considered }
