services:
  kairis-app:
    container_name: kairis-proxmox-test
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.proxmox-test
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: proxmox-test
    volumes:
      - ./proxmox-data:/app/.local-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
